# Docker bridge and overlay networks require packet forwarding.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# Ensure bridged container traffic traverses the host firewall rules.
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1

# Avoid exhausting the per-root key quota when many containers are created.
kernel.keys.root_maxkeys = 1000000
