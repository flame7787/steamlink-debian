name: Build Debian Image
on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version to build"
        required: true
        default: "6.1.115"
      kernel_branch:
        description: "Kernel branch to build"
        required: true
        default: "v6.x"
      debian_version:
        description: "Debian version to use"
        required: true
        default: "trixie"
      build_mode:
        description: "Build the kernel only or produce a complete disk image"
        required: true
        type: choice
        default: "full"
        options:
          - "full"
          - "kernel-only"

jobs:
  build-kernel:
    runs-on: [self-hosted, linux, x64, watermelon]
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Install dependencies
        shell: bash
        run: |
          echo "KERNEL_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

          packages=(
            bash ca-certificates git tar xz-utils wget patch ccache
            build-essential flex bison libssl-dev libelf-dev bc kmod
          )
          missing=()
          for package in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$package" 2>/dev/null | grep -q '^install ok installed$'; then
              missing+=("$package")
            fi
          done

          if ((${#missing[@]})); then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends "${missing[@]}"
          else
            echo "All kernel build dependencies are already installed."
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "true"

      - name: Download Kernel
        run: wget https://cdn.kernel.org/pub/linux/kernel/${{ inputs.kernel_branch }}/linux-${{ inputs.kernel_version }}.tar.xz

      - name: Extract Kernel
        run: tar -xf linux-${{ inputs.kernel_version }}.tar.xz

      - name: Copy Kernel Config
        run: cp ./kernel/${{ inputs.kernel_version }}.config ./linux-${{ inputs.kernel_version }}/.config

      - name: Build Kernel
        env:
          KERNEL_VERSION: ${{ inputs.kernel_version }}
        shell: bash
        run: |
          started_at=$(date +%s)
          ./kernel/build.sh
          echo "KERNEL_BUILD_SECONDS=$(( $(date +%s) - started_at ))" >> "$GITHUB_ENV"

      - name: Prepare Artifacts
        working-directory: linux-${{ inputs.kernel_version }}
        run: |
          mv /tmp/build-modules/lib/modules/${{ inputs.kernel_version }}-steam ../boot/
          mv arch/arm/boot/zImage ../boot/
          mv $(find . -name berlin2cd-valve-steamlink.dtb) ../boot/
          mv .config ../boot/config-${{ inputs.kernel_version }}-steam
          rm -rf ../boot/${{ inputs.kernel_version }}-steam/build
          rm -rf ../boot/${{ inputs.kernel_version }}-steam/source

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kernel-${{ inputs.kernel_version }}-steam
          path: boot/

      - name: Record kernel timing
        if: ${{ always() }}
        shell: bash
        run: |
          elapsed=$(( $(date +%s) - KERNEL_JOB_STARTED_AT ))
          {
            echo "### Kernel build"
            echo "- Mode: \`${{ inputs.build_mode }}\`"
            echo "- Kernel compile: ${KERNEL_BUILD_SECONDS:-not completed} seconds"
            echo "- Kernel job elapsed: ${elapsed} seconds"
          } >> "$GITHUB_STEP_SUMMARY"

  build-rootfs:
    runs-on: [self-hosted, linux, x64, watermelon]
    needs: build-kernel
    if: ${{ inputs.build_mode == 'full' }}
    steps:
      - name: Install dependencies
        shell: bash
        run: |
          echo "ROOTFS_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

          packages=(bash parted xz-utils)
          missing=()
          for package in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$package" 2>/dev/null | grep -q '^install ok installed$'; then
              missing+=("$package")
            fi
          done

          if ((${#missing[@]})); then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends "${missing[@]}"
          else
            echo "All rootfs build dependencies are already installed."
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "false"

      - name: Check ARM emulation registration
        id: qemu_check
        shell: bash
        run: |
          if [[ -r /proc/sys/fs/binfmt_misc/qemu-arm ]] && \
             grep -q '^enabled$' /proc/sys/fs/binfmt_misc/qemu-arm; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "ARM binfmt registration is already active."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: ${{ steps.qemu_check.outputs.ready != 'true' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          name: steamlink-builder
          keep-state: true
          cleanup: false

      - name: Download kernel artifact
        uses: actions/download-artifact@v8
        with:
          name: kernel-${{ inputs.kernel_version }}-steam
          path: kernel-${{ inputs.kernel_version }}

      - name: Build and export RootFS
        shell: bash
        run: |
          started_at=$(date +%s)
          docker buildx build \
            --builder steamlink-builder \
            --progress=plain \
            --platform linux/arm/v7 \
            --build-arg KERNEL_VERSION=${{ inputs.kernel_version }} \
            --build-arg DEBIAN_VERSION=${{ inputs.debian_version }} \
            --file rootfs/Dockerfile \
            --output type=tar,dest=rootfs.tar \
            . 2>&1 | tee buildx-rootfs.log
          cache_hits=$(grep -c ' CACHED$' buildx-rootfs.log || true)
          echo "ROOTFS_CACHE_HITS=$cache_hits" >> "$GITHUB_ENV"
          echo "ROOTFS_BUILD_SECONDS=$(( $(date +%s) - started_at ))" >> "$GITHUB_ENV"

      - name: Create disk image
        shell: bash
        run: |
          started_at=$(date +%s)
          sudo ./rootfs/build.sh
          echo "IMAGE_BUILD_SECONDS=$(( $(date +%s) - started_at ))" >> "$GITHUB_ENV"

      - name: Prepare compressed disk image
        run: |
          mv steamlink-debian.img.xz steamlink-debian-${{ inputs.debian_version }}-${{ inputs.kernel_version }}.img.xz

      - name: Upload disk image
        uses: actions/upload-artifact@v7
        with:
          name: steamlink-debian-${{ inputs.debian_version }}-${{ inputs.kernel_version }}-image
          path: steamlink-debian-${{ inputs.debian_version }}-${{ inputs.kernel_version }}.img.xz
          compression-level: 0

      - name: Limit persistent BuildKit cache
        if: ${{ always() }}
        run: docker buildx --builder steamlink-builder prune --force --max-used-space 10gb

      - name: Record rootfs timing
        if: ${{ always() }}
        shell: bash
        run: |
          elapsed=$(( $(date +%s) - ROOTFS_JOB_STARTED_AT ))
          {
            echo "### Rootfs and disk image"
            echo "- Rootfs build/export: ${ROOTFS_BUILD_SECONDS:-not completed} seconds"
            echo "- BuildKit cached steps: ${ROOTFS_CACHE_HITS:-not completed}"
            echo "- Disk image creation/compression: ${IMAGE_BUILD_SECONDS:-not completed} seconds"
            echo "- Rootfs job elapsed: ${elapsed} seconds"
            echo "- BuildKit cache limit: 10 GB"
          } >> "$GITHUB_STEP_SUMMARY"
